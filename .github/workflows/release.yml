name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag in the form vX.Y.Z
        required: true
        type: string

permissions:
  contents: read

jobs:
  build-release-artifacts:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      attestations: write
      id-token: write

    steps:
      - name: Validate tag format
        shell: bash
        run: |
          set -euo pipefail
          [[ "${{ inputs.tag }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]

      - name: Checkout tagged source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          ref: refs/tags/${{ inputs.tag }}

      - name: Ensure the checkout is on the requested tag
        shell: bash
        run: |
          set -euo pipefail
          actual_tag="$(git describe --tags --exact-match)"
          [[ "$actual_tag" == "${{ inputs.tag }}" ]]

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: 10.0.301

      - name: Restore local tools
        run: dotnet tool restore --tool-manifest dotnet-tools.json

      - name: Restore packages in locked mode
        run: dotnet restore CircuitDotNet.slnx --locked-mode

      - name: Check Fantomas formatting
        run: dotnet fantomas . --check

      - name: Build
        run: dotnet build CircuitDotNet.slnx -c Release --no-restore

      - name: Run non-package tests
        run: dotnet test CircuitDotNet.slnx -c Release --no-build --filter "Category!=Package"

      - name: Enforce exact Core and MAF branch coverage gates
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/coverage/core artifacts/coverage/maf

          dotnet test tests/Circuit.Core.Tests/Circuit.Core.Tests.fsproj \
            -c Release \
            --no-build \
            --filter "Category!=Package" \
            /p:CollectCoverage=true \
            /p:CoverletOutputFormat=cobertura \
            /p:CoverletOutput="$PWD/artifacts/coverage/core/"

          dotnet test tests/Circuit.MicrosoftAgentFramework.Tests/Circuit.MicrosoftAgentFramework.Tests.fsproj \
            -c Release \
            --no-build \
            --filter "Category!=Package" \
            /p:CollectCoverage=true \
            /p:CoverletOutputFormat=cobertura \
            /p:CoverletOutput="$PWD/artifacts/coverage/maf/"

          python - <<'PY'
          import xml.etree.ElementTree as ET

          gates = {
              'core': ('artifacts/coverage/core/coverage.cobertura.xml', 80.0),
              'maf': ('artifacts/coverage/maf/coverage.cobertura.xml', 80.0),
          }

          for name, (path, threshold) in gates.items():
              root = ET.parse(path).getroot()
              covered = int(root.attrib['branches-covered'])
              valid = int(root.attrib['branches-valid'])
              lines_valid = int(root.attrib['lines-valid'])
              if valid == 0 or lines_valid == 0:
                  raise SystemExit(f'{name} coverage report did not include branch and line totals.')

              branch_rate = covered / valid * 100
              print(f'{name} branch coverage: {branch_rate:.2f}% ({covered}/{valid})')
              if branch_rate < threshold:
                  raise SystemExit(
                      f'{name} branch coverage {branch_rate:.2f}% is below the required {threshold:.2f}%.')
          PY

      - name: Build docs
        run: dotnet docfx docfx.json --warningsAsErrors

      - name: Pack release artifacts
        run: dotnet pack CircuitDotNet.slnx -c Release --no-build -o artifacts/packages

      - name: Ensure packed version matches tag
        shell: bash
        run: |
          set -euo pipefail
          expected_version="${{ inputs.tag }}"
          export EXPECTED_VERSION="${expected_version#v}"
          python - <<'PY'
          import glob
          import os
          import zipfile
          import xml.etree.ElementTree as ET

          expected = os.environ['EXPECTED_VERSION']
          namespace = {'n': 'http://schemas.microsoft.com/packaging/2013/05/nuspec.xsd'}
          versions = set()
          for path in sorted(p for p in glob.glob('artifacts/packages/*.nupkg') if not p.endswith('.snupkg')):
              with zipfile.ZipFile(path) as archive:
                  nuspec_name = next(name for name in archive.namelist() if name.endswith('.nuspec'))
                  root = ET.fromstring(archive.read(nuspec_name))
                  versions.add(root.findtext('n:metadata/n:version', namespaces=namespace))
          if versions != {expected}:
              raise SystemExit(f'Expected packed version {expected}, found {sorted(versions)}.')
          PY

      - name: Run package smoke tests
        env:
          PackageDirectory: ${{ github.workspace }}/artifacts/packages
        run: dotnet test CircuitDotNet.slnx -c Release --no-build --filter "Category=Package"

      - name: Validate SourceLink
        shell: bash
        run: |
          set -euo pipefail
          pdbs=(
            src/Circuit.Core/bin/Release/net10.0/Circuit.Core.pdb
            src/Circuit.FSharp/bin/Release/net10.0/Circuit.FSharp.pdb
            src/Circuit/bin/Release/net10.0/Circuit.pdb
            src/Circuit.MicrosoftAgentFramework/bin/Release/net10.0/Circuit.MicrosoftAgentFramework.pdb
            src/Circuit.Testing/bin/Release/net10.0/Circuit.Testing.pdb
          )

          for pdb in "${pdbs[@]}"; do
            dotnet sourcelink test "$pdb"
          done

      - name: Scan for vulnerable and deprecated runtime packages
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import subprocess

          projects = [
              'src/Circuit.Core/Circuit.Core.fsproj',
              'src/Circuit.FSharp/Circuit.FSharp.fsproj',
              'src/Circuit/Circuit.csproj',
              'src/Circuit.MicrosoftAgentFramework/Circuit.MicrosoftAgentFramework.fsproj',
              'src/Circuit.Testing/Circuit.Testing.fsproj',
          ]

          def check(flag: str) -> None:
              actionable = []
              for project in projects:
                  result = subprocess.run(
                      [
                          'dotnet', 'package', 'list', '--project', project,
                          flag, '--include-transitive', '--format', 'json', '--output-version', '1', '--no-restore'
                      ],
                      check=True,
                      capture_output=True,
                      text=True,
                  )
                  data = json.loads(result.stdout)
                  for proj in data.get('projects', []):
                      for framework in proj.get('frameworks', []):
                          for key in ('topLevelPackages', 'transitivePackages'):
                              for package in framework.get(key, []):
                                  actionable.append((project, framework.get('framework'), package.get('id'), package.get('resolvedVersion'), flag))
              if actionable:
                  lines = [f'{project} [{framework}] {package_id} {version} ({flag})' for project, framework, package_id, version, flag in actionable]
                  raise SystemExit('Actionable package findings detected:\n' + '\n'.join(lines))

          check('--vulnerable')
          check('--deprecated')
          PY

      - name: Recheck packed package IDs and counts
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import glob
          import zipfile
          import xml.etree.ElementTree as ET

          expected = [
              'CircuitDotNet',
              'CircuitDotNet.Core',
              'CircuitDotNet.FSharp',
              'CircuitDotNet.MicrosoftAgentFramework',
              'CircuitDotNet.Testing',
          ]
          namespace = {'n': 'http://schemas.microsoft.com/packaging/2013/05/nuspec.xsd'}

          nupkgs = sorted(path for path in glob.glob('artifacts/packages/*.nupkg') if not path.endswith('.snupkg'))
          snupkgs = sorted(glob.glob('artifacts/packages/*.snupkg'))
          if len(nupkgs) != 5 or len(snupkgs) != 5:
              raise SystemExit(f'Expected 5 nupkgs and 5 snupkgs, found {len(nupkgs)} and {len(snupkgs)}.')

          actual = []
          for path in nupkgs:
              with zipfile.ZipFile(path) as archive:
                  nuspec_name = next(name for name in archive.namelist() if name.endswith('.nuspec'))
                  root = ET.fromstring(archive.read(nuspec_name))
                  actual.append(root.findtext('n:metadata/n:id', namespaces=namespace))

          if sorted(actual) != expected:
              raise SystemExit(f'Expected package IDs {expected}, found {sorted(actual)}.')
          PY

      - name: Generate CycloneDX SBOM
        run: >-
          dotnet cyclonedx CircuitDotNet.slnx
          --exclude-test-projects
          --configuration Release
          --output artifacts/sbom
          --filename circuitdotnet.bom.json
          --output-format Json

      - name: Verify generated files stay clean
        run: git diff --exit-code

      - name: Upload release packages
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: release-packages
          path: artifacts/packages
          if-no-files-found: error

      - name: Upload release metadata
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: release-metadata
          path: |
            artifacts/coverage
            artifacts/sbom/circuitdotnet.bom.json
          if-no-files-found: error

      - name: Attest build provenance
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2.4.0
        with:
          subject-path: |
            artifacts/packages/*.nupkg
            artifacts/packages/*.snupkg
            artifacts/sbom/circuitdotnet.bom.json

  publish:
    runs-on: ubuntu-latest
    needs: build-release-artifacts
    environment: nuget-release
    permissions:
      contents: read

    steps:
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: 10.0.301

      - name: Download release packages
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: release-packages
          path: artifacts/packages

      - name: Recheck package IDs immediately before publish
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import glob
          import zipfile
          import xml.etree.ElementTree as ET

          expected = [
              'CircuitDotNet',
              'CircuitDotNet.Core',
              'CircuitDotNet.FSharp',
              'CircuitDotNet.MicrosoftAgentFramework',
              'CircuitDotNet.Testing',
          ]
          namespace = {'n': 'http://schemas.microsoft.com/packaging/2013/05/nuspec.xsd'}

          nupkgs = sorted(path for path in glob.glob('artifacts/packages/*.nupkg') if not path.endswith('.snupkg'))
          snupkgs = sorted(glob.glob('artifacts/packages/*.snupkg'))
          if len(nupkgs) != 5 or len(snupkgs) != 5:
              raise SystemExit(f'Expected 5 nupkgs and 5 snupkgs, found {len(nupkgs)} and {len(snupkgs)}.')

          actual = []
          for path in nupkgs:
              with zipfile.ZipFile(path) as archive:
                  nuspec_name = next(name for name in archive.namelist() if name.endswith('.nuspec'))
                  root = ET.fromstring(archive.read(nuspec_name))
                  actual.append(root.findtext('n:metadata/n:id', namespaces=namespace))

          if sorted(actual) != expected:
              raise SystemExit(f'Expected package IDs {expected}, found {sorted(actual)}.')
          PY

      - name: Publish nupkg artifacts
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          for package in artifacts/packages/*.nupkg artifacts/packages/*.snupkg; do
            dotnet nuget push "$package" --api-key "$NUGET_API_KEY" --source https://api.nuget.org/v3/index.json --skip-duplicate
          done
